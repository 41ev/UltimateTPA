name: DonutTPA
version: 1.0.0
main: dev.donuttpa.Main
api-version: "1.21"
author: 41ev
description: Feature-rich TPA plugin with GUI, SQLite, Folia support

commands:
  tpa:
    description: Send a teleport request to a player
    usage: /tpa <player>
    permission: donuttpa.tpa
  tpahere:
    description: Send a teleport-here request to a player
    usage: /tpahere <player>
    permission: donuttpa.tpahere
  tpaccept:
    description: Accept a pending TPA request
    usage: /tpaccept [player]
    permission: donuttpa.tpaccept
  tpadeny:
    description: Deny a pending TPA request
    usage: /tpadeny <player>
    permission: donuttpa.tpadeny
  tpacancel:
    description: Cancel your outgoing TPA request(s)
    usage: /tpacancel
    permission: donuttpa.tpacancel
  tpatoggle:
    description: Toggle receiving TPA requests
    usage: /tpatoggle
    permission: donuttpa.tpatoggle
  tpaheretoggle:
    description: Toggle receiving TPA-here requests
    usage: /tpaheretoggle
    permission: donuttpa.tpaheretoggle
  tpaauto:
    aliases: [tpauto]
    description: Toggle auto-accept TPA requests
    usage: /tpaauto
    permission: donuttpa.tpaauto
  tpaguitoggle:
    description: Toggle GUI for TPA requests
    usage: /tpaguitoggle
    permission: donuttpa.tpaguitoggle
  tpareload:
    description: Reload plugin configs
    usage: /tpareload
    permission: donuttpa.tpareload
  tp:
    description: Admin teleport command
    usage: /tp <player> [target]
    permission: donuttpa.tp

permissions:
  donuttpa.admin:
    description: Full admin access
    default: op
    children:
      donuttpa.tpa: true
      donuttpa.tpahere: true
      donuttpa.tpaccept: true
      donuttpa.tpadeny: true
      donuttpa.tpacancel: true
      donuttpa.tpatoggle: true
      donuttpa.tpaheretoggle: true
      donuttpa.tpaauto: true
      donuttpa.tpaguitoggle: true
      donuttpa.tpareload: true
      donuttpa.tp: true
  donuttpa.tpa:
    description: Send TPA requests
    default: true
  donuttpa.tpahere:
    description: Send TPA-here requests
    default: true
  donuttpa.tpaccept:
    description: Accept TPA requests
    default: true
  donuttpa.tpadeny:
    description: Deny TPA requests
    default: true
  donuttpa.tpacancel:
    description: Cancel TPA requests
    default: true
  donuttpa.tpatoggle:
    description: Toggle TPA reception
    default: true
  donuttpa.tpaheretoggle:
    description: Toggle TPA-here reception
    default: true
  donuttpa.tpaauto:
    description: Toggle auto-accept
    default: true
  donuttpa.tpaguitoggle:
    description: Toggle GUI
    default: true
  donuttpa.tpareload:
    description: Reload configs
    default: op
  donuttpa.tp:
    description: Admin teleport
    default: op
